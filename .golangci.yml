version: "2"

linters:
  enable:
    - staticcheck
    - govet
    - errcheck
    - revive
    - gocritic
    - ineffassign
    - prealloc
    - unparam
    - gochecknoglobals
    - nilerr
    - errorlint
    - copyloopvar
    - makezero

  settings:
    revive:
      rules:
        - name: exported
          severity: warning

  exclusions:
    rules:
      # Tag and namespace registries are legitimately package-level state.
      - linters: [gochecknoglobals]
        text: "tagRegistry|namespaceRegistry"
