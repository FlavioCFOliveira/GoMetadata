name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GOTOOLCHAIN: local

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4

  test-race:
    name: Test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests with race detector
        run: go test -race -count=1 -skip ^Example ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic -skip ^Example ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run benchmarks (smoke)
        run: go test -bench=. -benchmem -benchtime=1x -skip ^Example ./...
